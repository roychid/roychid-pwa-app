<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Roy CMS">
  <meta name="theme-color" content="#09090b">
  <title>Roy CMS</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>

  <!-- React + Babel -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

  <!-- Lucide Icons -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.1/umd/lucide.min.js"></script>

  <style>
    :root {
      --bg:     #09090b;
      --bg1:    #111113;
      --bg2:    #18181b;
      --bg3:    #27272a;
      --border: #3f3f46;
      --border2:#52525b;
      --text:   #fafafa;
      --text2:  #a1a1aa;
      --text3:  #71717a;
      --accent: #7c3aed;
      --accentL:#8b5cf6;
      --accentS:rgba(124,58,237,0.15);
      --green:  #10b981;
      --greenS: rgba(16,185,129,0.12);
      --amber:  #f59e0b;
      --red:    #ef4444;
      --safe:   env(safe-area-inset-bottom,0px);
      --top:    env(safe-area-inset-top,0px);
    }

    * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }

    html,body,#root {
      height:100%; width:100%;
      background:var(--bg);
      color:var(--text);
      font-family:'Inter',sans-serif;
      font-size:15px;
      line-height:1.5;
      overflow:hidden;
      -webkit-font-smoothing:antialiased;
    }

    /* έΦΑέΦΑ APP SHELL έΦΑέΦΑ */
    .app { position:relative; width:100%; height:100%; display:flex; flex-direction:column; overflow:hidden; }

    /* έΦΑέΦΑ LOCK έΦΑέΦΑ */
    .lock {
      position:fixed; inset:0; z-index:300;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      background:radial-gradient(ellipse at 50% 0%, rgba(124,58,237,0.15) 0%, var(--bg) 70%);
    }
    .lock-logo {
      width:76px; height:76px; border-radius:22px;
      background:var(--accentS); border:1px solid rgba(124,58,237,0.35);
      display:flex; align-items:center; justify-content:center; margin-bottom:28px;
      box-shadow:0 0 40px rgba(124,58,237,0.2);
    }
    .lock-title { font-size:24px; font-weight:800; color:var(--text); margin-bottom:6px; letter-spacing:-0.5px; }
    .lock-sub   { font-size:13px; color:var(--text2); margin-bottom:44px; }
    .pdots { display:flex; gap:14px; margin-bottom:12px; }
    .pdot  { width:13px; height:13px; border-radius:50%; border:2px solid var(--border); background:transparent; transition:all 0.15s; }
    .pdot.on { background:var(--accent); border-color:var(--accent); transform:scale(1.1); }
    .perr  { font-size:12px; color:var(--red); height:18px; margin-bottom:20px; }
    .kpad  { display:grid; grid-template-columns:repeat(3,70px); gap:10px; }
    .kkey  {
      width:70px; height:70px; border-radius:50%;
      background:var(--bg2); border:1px solid var(--border);
      color:var(--text); font-family:'Inter',sans-serif; font-size:22px; font-weight:500;
      cursor:pointer; display:flex; align-items:center; justify-content:center;
      transition:all 0.12s; user-select:none;
    }
    .kkey:active { background:var(--bg3); transform:scale(0.92); }
    .kkey.ghost  { background:transparent; border-color:transparent; pointer-events:none; }
    @keyframes shake {
      0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-6px)} 80%{transform:translateX(6px)}
    }
    .shaking { animation:shake 0.35s ease; }

    /* έΦΑέΦΑ SCREENS έΦΑέΦΑ */
    .screens { flex:1; position:relative; overflow:hidden; }
    .screen  {
      position:absolute; inset:0;
      display:flex; flex-direction:column;
      background:var(--bg);
      will-change:transform;
      transition:transform 0.32s cubic-bezier(0.32,0.72,0,1), opacity 0.32s;
    }
    .screen.slide-right  { transform:translateX(100%); }
    .screen.slide-left   { transform:translateX(-6%); opacity:0.7; }
    .screen.slide-center { transform:translateX(0); opacity:1; }

    /* έΦΑέΦΑ TAB BAR έΦΑέΦΑ */
    .tabbar {
      display:flex; background:rgba(17,17,19,0.92);
      border-top:1px solid var(--border);
      padding-bottom:var(--safe);
      backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
      flex-shrink:0;
    }
    .tabitem {
      flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:3px; padding:10px 0; cursor:pointer; position:relative;
      transition:opacity 0.15s;
    }
    .tabitem-label { font-size:10px; font-weight:500; color:var(--text3); letter-spacing:0.2px; }
    .tabitem.active .tabitem-label { color:var(--accentL); }
    .tabitem svg   { color:var(--text3); transition:color 0.15s; }
    .tabitem.active svg { color:var(--accentL); }
    .tab-pip {
      position:absolute; top:8px; right:calc(50% - 14px);
      min-width:16px; height:16px; border-radius:8px;
      background:var(--red); font-size:10px; font-weight:700; color:#fff;
      display:flex; align-items:center; justify-content:center; padding:0 4px;
    }

    /* έΦΑέΦΑ TOPBAR έΦΑέΦΑ */
    .topbar {
      display:flex; align-items:center; justify-content:space-between;
      padding:12px 18px; padding-top:calc(12px + var(--top));
      background:rgba(17,17,19,0.92); border-bottom:1px solid var(--border);
      backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
      flex-shrink:0; min-height:56px;
    }
    .topbar-title { font-size:18px; font-weight:700; color:var(--text); letter-spacing:-0.3px; }
    .topbar-sub   { font-size:11px; color:var(--text3); margin-top:1px; }
    .ibtn {
      width:36px; height:36px; border-radius:10px;
      background:var(--bg2); border:1px solid var(--border);
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; transition:background 0.15s; flex-shrink:0; color:var(--text2);
    }
    .ibtn:active { background:var(--bg3); }
    .ibtn.accent { background:var(--accent); border-color:var(--accent); color:#fff; }

    /* έΦΑέΦΑ SCROLL BODY έΦΑέΦΑ */
    .sbody {
      flex:1; overflow-y:auto; overflow-x:hidden;
      -webkit-overflow-scrolling:touch;
      scroll-behavior:smooth;
    }
    .pad  { padding:16px; }
    .pad2 { padding:20px; }

    /* έΦΑέΦΑ CARDS έΦΑέΦΑ */
    .card  { background:var(--bg1); border:1px solid var(--border); border-radius:16px; padding:16px; margin-bottom:12px; }
    .card2 { background:var(--bg2); border:1px solid var(--border); border-radius:12px; padding:14px; margin-bottom:10px; }

    /* έΦΑέΦΑ SECTION LABEL έΦΑέΦΑ */
    .slabel { font-size:11px; font-weight:600; color:var(--text3); letter-spacing:0.8px; text-transform:uppercase; margin-bottom:10px; margin-top:4px; }

    /* έΦΑέΦΑ DASHBOARD έΦΑέΦΑ */
    .greeting { font-size:24px; font-weight:800; color:var(--text); letter-spacing:-0.5px; line-height:1.2; }
    .greeting-sub { font-size:13px; color:var(--text3); margin-top:4px; margin-bottom:24px; }

    .stats-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:24px; }
    .stat-box {
      background:var(--bg1); border:1px solid var(--border); border-radius:14px;
      padding:14px 10px; display:flex; flex-direction:column; align-items:center; gap:6px; cursor:pointer;
      transition:border-color 0.15s, transform 0.15s;
    }
    .stat-box:active { transform:scale(0.96); border-color:var(--accent); }
    .stat-ico { width:34px; height:34px; border-radius:9px; display:flex; align-items:center; justify-content:center; }
    .stat-n   { font-size:22px; font-weight:800; color:var(--text); letter-spacing:-0.5px; }
    .stat-l   { font-size:10px; color:var(--text3); text-align:center; font-weight:500; }

    .quick-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:24px; }
    .qbtn {
      background:var(--bg1); border:1px solid var(--border); border-radius:14px;
      padding:16px 14px; display:flex; flex-direction:column; gap:10px; cursor:pointer;
      transition:border-color 0.15s, transform 0.15s;
    }
    .qbtn:active { transform:scale(0.97); border-color:var(--accent); }
    .qbtn-ico   { width:38px; height:38px; border-radius:10px; display:flex; align-items:center; justify-content:center; }
    .qbtn-label { font-size:13px; font-weight:600; color:var(--text); }

    .rrow { display:flex; align-items:center; gap:12px; padding:11px 0; border-bottom:1px solid var(--border); cursor:pointer; }
    .rrow:last-child { border-bottom:none; padding-bottom:0; }
    .rrow-title { font-size:14px; font-weight:500; color:var(--text); flex:1; }
    .rrow-sub   { font-size:12px; color:var(--text3); margin-top:1px; }
    .avatar { width:36px; height:36px; border-radius:50%; background:var(--accentS); display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; color:var(--accentL); flex-shrink:0; }

    /* έΦΑέΦΑ BADGE έΦΑέΦΑ */
    .badge { font-size:10px; font-weight:700; padding:3px 8px; border-radius:20px; }

    /* έΦΑέΦΑ PROJECTS έΦΑέΦΑ */
    .pcard { background:var(--bg1); border:1px solid var(--border); border-radius:16px; overflow:hidden; margin-bottom:14px; }
    .pcover { width:100%; height:160px; background:var(--bg2); display:flex; align-items:center; justify-content:center; overflow:hidden; position:relative; }
    .pcover img { width:100%; height:100%; object-fit:cover; }
    .pcover-placeholder { display:flex; flex-direction:column; align-items:center; gap:6px; color:var(--text3); }
    .pbody { padding:14px; }
    .ptop  { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:6px; }
    .pname { font-size:16px; font-weight:700; color:var(--text); letter-spacing:-0.2px; flex:1; margin-right:8px; }
    .pdesc { font-size:13px; color:var(--text2); line-height:1.6; margin-bottom:10px; }
    .tags  { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:12px; }
    .tag   { font-size:11px; font-weight:500; color:var(--accentL); background:var(--accentS); padding:3px 9px; border-radius:20px; }
    .pacts { display:flex; gap:8px; border-top:1px solid var(--border); padding-top:12px; }
    .pabtn { flex:1; padding:9px; border-radius:9px; border:1px solid var(--border); background:var(--bg2); font-size:12px; font-weight:600; color:var(--text2); cursor:pointer; display:flex; align-items:center; justify-content:center; gap:5px; font-family:'Inter',sans-serif; transition:all 0.15s; }
    .pabtn:active { background:var(--bg3); }
    .pabtn.p { background:var(--accent); border-color:var(--accent); color:#fff; }
    .pabtn.d { color:var(--red); border-color:rgba(239,68,68,0.3); }

    /* έΦΑέΦΑ FORM έΦΑέΦΑ */
    .field { margin-bottom:18px; }
    .field-label { display:block; font-size:11px; font-weight:600; color:var(--text3); letter-spacing:0.5px; text-transform:uppercase; margin-bottom:8px; }
    .finput, .ftarea {
      width:100%; background:var(--bg2); border:1px solid var(--border);
      border-radius:10px; padding:12px 14px;
      font-family:'Inter',sans-serif; font-size:14px; color:var(--text);
      outline:none; -webkit-appearance:none; transition:border-color 0.2s;
    }
    .finput:focus, .ftarea:focus { border-color:var(--accent); }
    .ftarea { resize:none; }
    .finput::placeholder, .ftarea::placeholder { color:var(--text3); }
    .spills { display:flex; gap:8px; }
    .spill  { flex:1; padding:10px; border-radius:9px; border:1px solid var(--border); background:var(--bg2); font-size:13px; font-weight:500; color:var(--text2); cursor:pointer; text-align:center; font-family:'Inter',sans-serif; transition:all 0.15s; }
    .spill.on { border-color:var(--accent); background:var(--accentS); color:var(--accentL); }
    .imgpick { width:100%; height:160px; border-radius:12px; border:2px dashed var(--border); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; cursor:pointer; overflow:hidden; position:relative; background:var(--bg2); transition:border-color 0.2s; }
    .imgpick:active { border-color:var(--accent); }
    .imgpick img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
    .imgpick-ov { position:absolute; inset:0; background:rgba(0,0,0,0.5); display:flex; align-items:center; justify-content:center; z-index:2; }
    .btn-a { width:100%; padding:14px; border-radius:12px; background:var(--accent); border:none; color:#fff; font-family:'Inter',sans-serif; font-size:15px; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; letter-spacing:-0.2px; transition:opacity 0.2s; }
    .btn-a:active { opacity:0.82; }
    .btn-a:disabled { opacity:0.4; }
    .btn-g { width:100%; padding:13px; border-radius:12px; background:transparent; border:1px solid var(--border); color:var(--text2); font-family:'Inter',sans-serif; font-size:14px; font-weight:500; cursor:pointer; margin-top:10px; transition:background 0.15s; }
    .btn-g:active { background:var(--bg2); }

    /* έΦΑέΦΑ MESSAGES έΦΑέΦΑ */
    .mcard { background:var(--bg1); border:1px solid var(--border); border-radius:14px; padding:14px; margin-bottom:10px; cursor:pointer; display:flex; gap:12px; align-items:flex-start; transition:border-color 0.15s; }
    .mcard.unread { border-color:rgba(124,58,237,0.5); background:rgba(124,58,237,0.04); }
    .mcard:active { border-color:var(--border2); }
    .minfo { flex:1; min-width:0; }
    .mtop  { display:flex; justify-content:space-between; align-items:center; margin-bottom:3px; }
    .mname { font-size:14px; font-weight:600; color:var(--text); }
    .mtime { font-size:11px; color:var(--text3); }
    .msubj { font-size:13px; font-weight:500; color:var(--text); margin-bottom:2px; }
    .mprev { font-size:12px; color:var(--text2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .udot  { width:8px; height:8px; border-radius:50%; background:var(--accentL); flex-shrink:0; margin-top:4px; }

    /* έΦΑέΦΑ SECTIONS έΦΑέΦΑ */
    .secitem { background:var(--bg1); border:1px solid var(--border); border-radius:14px; padding:16px; margin-bottom:10px; display:flex; gap:14px; align-items:center; cursor:pointer; transition:border-color 0.15s; }
    .secitem:active { border-color:var(--accent); }
    .secico  { width:44px; height:44px; border-radius:11px; background:var(--accentS); display:flex; align-items:center; justify-content:center; flex-shrink:0; color:var(--accentL); }

    /* έΦΑέΦΑ ANALYTICS έΦΑέΦΑ */
    .analytics-hero { background:linear-gradient(135deg, var(--accentS), rgba(124,58,237,0.05)); border:1px solid rgba(124,58,237,0.2); border-radius:16px; padding:20px; margin-bottom:16px; }
    .a-big  { font-size:48px; font-weight:800; color:var(--text); letter-spacing:-2px; line-height:1; }
    .a-sub  { font-size:13px; color:var(--text2); margin-top:4px; }
    .a-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px; }
    .a-box  { background:var(--bg1); border:1px solid var(--border); border-radius:14px; padding:16px; }
    .a-box-n { font-size:24px; font-weight:800; color:var(--text); letter-spacing:-0.5px; }
    .a-box-l { font-size:11px; color:var(--text3); margin-top:2px; font-weight:500; }
    .bar-row { display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid var(--border); }
    .bar-row:last-child { border-bottom:none; }
    .bar-label { font-size:13px; color:var(--text2); width:80px; flex-shrink:0; }
    .bar-track { flex:1; height:6px; background:var(--bg3); border-radius:3px; overflow:hidden; }
    .bar-fill  { height:100%; background:var(--accent); border-radius:3px; transition:width 0.8s cubic-bezier(0.16,1,0.3,1); }
    .bar-count { font-size:12px; color:var(--text3); width:28px; text-align:right; flex-shrink:0; }
    .country-flag { font-size:18px; }

    /* έΦΑέΦΑ SETTINGS έΦΑέΦΑ */
    .sgroup { margin-bottom:24px; }
    .srows  { background:var(--bg1); border:1px solid var(--border); border-radius:14px; overflow:hidden; }
    .srow   { display:flex; align-items:center; gap:14px; padding:14px 16px; cursor:pointer; border-bottom:1px solid var(--border); transition:background 0.15s; }
    .srow:last-child { border-bottom:none; }
    .srow:active { background:var(--bg2); }
    .srow-ico   { width:32px; height:32px; border-radius:8px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .srow-label { font-size:14px; font-weight:500; color:var(--text); flex:1; }
    .srow-sub   { font-size:12px; color:var(--text3); margin-top:1px; }

    /* έΦΑέΦΑ EMPTY έΦΑέΦΑ */
    .empty { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:60px 20px; gap:12px; }
    .empty-ico   { color:var(--text3); margin-bottom:4px; }
    .empty-title { font-size:16px; font-weight:600; color:var(--text2); }
    .empty-sub   { font-size:13px; color:var(--text3); text-align:center; line-height:1.6; }

    /* έΦΑέΦΑ TOAST έΦΑέΦΑ */
    .toast-wrap {
      position:fixed; bottom:calc(72px + var(--safe)); left:50%; transform:translateX(-50%) translateY(16px);
      z-index:500; pointer-events:none; width:calc(100% - 32px); max-width:360px;
      transition:all 0.3s cubic-bezier(0.32,0.72,0,1);
      opacity:0;
    }
    .toast-wrap.visible { transform:translateX(-50%) translateY(0); opacity:1; }
    .toast-inner { background:var(--bg3); border:1px solid var(--border2); border-radius:12px; padding:13px 16px; font-size:13px; font-weight:500; text-align:center; }
    .toast-inner.s { border-color:var(--green); color:var(--green); }
    .toast-inner.e { border-color:var(--red); color:var(--red); }

    /* έΦΑέΦΑ SPINNER έΦΑέΦΑ */
    .spin { width:22px; height:22px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spinning 0.6s linear infinite; }
    @keyframes spinning { to { transform:rotate(360deg); } }
    .spin-center { display:flex; align-items:center; justify-content:center; padding:60px; }

    /* έΦΑέΦΑ INFO HINT έΦΑέΦΑ */
    .hint { background:var(--accentS); border:1px solid rgba(124,58,237,0.2); border-radius:10px; padding:12px; margin-bottom:20px; font-size:13px; color:var(--text2); line-height:1.6; }

    ::-webkit-scrollbar { width:0; }

    @media(min-width:480px){
      .app { max-width:480px; margin:0 auto; box-shadow:0 0 0 1px var(--border); }
      body { background:#000; }
    }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// έΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡ
// FIREBASE

// LUCIDE ICON WRAPPER
// έΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡ
function Icon({ name, size=20, color, className='' }) {
  const ref = useRef(null);
  useEffect(() => {
    if (ref.current && window.lucide) {
      ref.current.innerHTML = '';
      const icons = window.lucide;
      const key   = name.replace(/-./g, x => x[1].toUpperCase());
      if (icons[key]) {
        const el = document.createElement('div');
        el.innerHTML = icons[key].toSvg({ width: size, height: size, color: color || 'currentColor', 'stroke-width': 1.8 });
        ref.current.appendChild(el.firstChild);
      }
    }
  }, [name, size, color]);
  return <span ref={ref} className={className} style={{ display:'flex', alignItems:'center', justifyContent:'center' }} />;
}

let _toastFn = null;
function Toast() {
  const [state, setState] = useState({ msg:'', type:'', visible:false });
  const timer = useRef(null);
  useEffect(() => {
    _toastFn = (msg, type='') => {
      clearTimeout(timer.current);
      setState({ msg, type, visible:true });
      timer.current = setTimeout(() => setState(s => ({...s, visible:false})), 3000);
    };
  }, []);
  return (
    <div className={`toast-wrap ${state.visible?'visible':''}`}>
      <div className={`toast-inner ${state.type==='success'?'s':state.type==='error'?'e':''}`}>{state.msg}</div>
    </div>
  );
}
const toast = (msg, type) => _toastFn && _toastFn(msg, type);

function fmtTime(ts) {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  const diff = Date.now() - d;
  if (diff < 60000) return 'Just now';
  if (diff < 3600000) return Math.floor(diff/60000)+'m ago';
  if (diff < 86400000) return Math.floor(diff/3600000)+'h ago';
  return d.toLocaleDateString();
}

// SLIDE NAV HOOK
// έΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡ
function useNav(initial='dash') {
  const [tab, setTab]           = useState(initial);
  const [stack, setStack]       = useState([]);   // pushed screens
  const [direction, setDir]     = useState('none');

  const switchTab = useCallback(name => {
    setDir('none');
    setStack([]);
    setTab(name);
  }, []);

  const push = useCallback(name => {
    setDir('forward');
    setStack(s => [...s, name]);
  }, []);

  const pop = useCallback(() => {
    setDir('back');
    setStack(s => s.slice(0,-1));
  }, []);

  const current = stack.length ? stack[stack.length-1] : tab;
  return { tab, stack, current, direction, switchTab, push, pop };
}

// PIN SCREEN
// έΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡ
function PinScreen({ onUnlock }) {
  const [buf, setBuf]       = useState('');
  const [mode, setMode]     = useState(() => localStorage.getItem('rpin') ? 'enter' : 'set');
  const [conf, setConf]     = useState('');
  const [err, setErr]       = useState('');
  const [shaking, setShake] = useState(false);

  function shake() {
    setShake(true);
    setTimeout(() => setShake(false), 400);
  }

  function press(k) {
    if (k === 'del') { setBuf(b => b.slice(0,-1)); return; }
    if (buf.length >= 4) return;
    const next = buf + k;
    setBuf(next);
    if (next.length === 4) setTimeout(() => handle(next), 120);
  }

  function handle(pin) {
    if (mode === 'set') {
      setConf(pin); setBuf('');
      setMode('confirm');
      setErr('');
    } else if (mode === 'confirm') {
      if (pin === conf) {
        localStorage.setItem('rpin', pin);
        onUnlock();
      } else {
        setBuf(''); setConf(''); setMode('set');
        setErr("PINs didn't match");
        shake();
      }
    } else {
      if (pin === localStorage.getItem('rpin')) {
        onUnlock();
      } else {
        setBuf(''); setErr('Incorrect PIN'); shake();
      }
    }
  }

  const titles = { set:'Create a PIN', confirm:'Confirm PIN', enter:'Welcome back, Roy' };
  const subs   = { set:'Set a 4-digit PIN to protect your CMS', confirm:'Enter your PIN again to confirm', enter:'Enter your PIN to continue' };

  return (
    <div className="lock">
      <div className="lock-logo">
        <Icon name="layout-dashboard" size={32} color="#8b5cf6" />
      </div>
      <div className="lock-title">{titles[mode]}</div>
      <div className="lock-sub">{subs[mode]}</div>
      <div className={`pdots ${shaking?'shaking':''}`}>
        {[0,1,2,3].map(i => <div key={i} className={`pdot ${i<buf.length?'on':''}`} />)}
      </div>
      <div className="perr">{err}</div>
      <div className="kpad">
        {['1','2','3','4','5','6','7','8','9','','0','del'].map((k,i) => (
          <div key={i} className={`kkey ${k===''?'ghost':''}`} onClick={() => k && press(k)}>
            {k==='del' ? <Icon name="delete" size={20} /> : k}
          </div>
        ))}
      </div>
    </div>
  );
}

function ProjectForm({ nav, projects, reload, editId }) {
  const editing = editId ? projects.find(p=>p.id===editId) : null;
  const [title,  setTitle]  = useState(editing?.title||'');
  const [desc,   setDesc]   = useState(editing?.description||'');
  const [live,   setLive]   = useState(editing?.liveUrl||'');
  const [github, setGithub] = useState(editing?.githubUrl||'');
  const [tags,   setTags]   = useState((editing?.tags||[]).join(', '));
  const [status, setStatus] = useState(editing?.status||'Live');
  const [imgFile, setImgFile]= useState(null);
  const [imgPrev, setImgPrev]= useState(editing?.imageUrl||null);
  const [saving, setSaving] = useState(false);

  async function save() {
    if (!title.trim()) { toast('Title is required','error'); return; }
    setSaving(true);
    let imageUrl  = editing?.imageUrl||null;
    let imagePath = editing?.imagePath||null;
    try {
      if (imgFile) {
        const path = `projects/${Date.now()}_${imgFile.name}`;
        const ref  = storage.ref(path);
        await ref.put(imgFile);
        imageUrl  = await ref.getDownloadURL();
        imagePath = path;
      }
      const data = {
        title:title.trim(), description:desc.trim(),
        liveUrl:live.trim(), githubUrl:github.trim(),
        tags:tags.split(',').map(t=>t.trim()).filter(Boolean),
        status, imageUrl, imagePath
      };
      if (editing) {
        await db.collection('projects').doc(editing.id).update({...data, updatedAt:ts()});
      } else {
        await db.collection('projects').add({...data, order:Date.now(), createdAt:ts()});
      }
      await reload();
      toast(editing?'Project updated έεΥ':'Project added έεΥ','success');
      nav.pop();
    } catch(e) { toast('Save failed','error'); console.error(e); }
    finally { setSaving(false); }
  }

  return (
    <div className="screen slide-right" style={{zIndex:20}}>
      <div className="topbar">
        <div className="ibtn" onClick={() => nav.pop()}><Icon name="arrow-left" size={20}/></div>
        <div className="topbar-title">{editing?'Edit Project':'New Project'}</div>
        <div style={{width:36}}/>
      </div>
      <div className="sbody pad2">
        <div className="field">
          <label className="field-label">Cover Image</label>
          <div className="imgpick" onClick={() => document.getElementById('imgInput').click()}>
            {imgPrev && <img src={imgPrev}/>}
            {imgPrev

// έΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡ
// SECTION EDITOR
// έΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡ
function SectionEditor({ nav, sections, setSections, sectionKey }) {
  const data  = sections[sectionKey]||{};
  const [vals, setVals] = useState({...data});
  const [saving, setSav]= useState(false);

  async function save() {
    setSav(true);
    try {
      await db.collection('sections').doc(sectionKey).update({...vals, updatedAt:ts()});
      setSections(s => ({...s, [sectionKey]:{...s[sectionKey],...vals}}));
      toast('Section saved έεΥ','success');
      nav.pop();
    } catch(e) { toast('Save failed','error'); }
    finally { setSav(false); }
  }

  return (
    <div className="screen slide-right" style={{zIndex:20}}>
      <div className="topbar">
        <div className="ibtn" onClick={() => nav.pop()}><Icon name="arrow-left" size={20}/></div>
        <div className="topbar-title">{sectionKey.charAt(0).toUpperCase()+sectionKey.slice(1)}</div>
        <div style={{width:36}}/>
      </div>
      <div className="sbody pad2">
        <div className="hint">ΏθΤκ Changes go live on your portfolio site immediately after saving.</div>
        {Object.keys(data).map(f => (
          <div key={f} className="field">
            <label className="field-label">{f.replace(/_/g,' ')}</label>
            {f.includes('para')||String(data[f]).length>80
              ? <textarea className="ftarea" rows={4} value={vals[f]||''} onChange={e=>setVals(v=>({...v,[f]:e.target.value}))}/>
              : <input className="finput" value={String(vals[f]||'')} onChange={e=>setVals(v=>({...v,[f]:e.target.value}))}/>
            }
          </div>
        ))}
        <button className="btn-a" onClick={save} disabled={saving}>
          {saving ? <div className="spin"/> : 'Save Changes'}
        </button>
        <button className="btn-g" onClick={() => nav.pop()}>Cancel</button>
      </div>
    </div>
  );
}

// MESSAGE DETAIL
// έΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡ
function MsgDetail({ nav, messages, msgId }) {
  const m = messages.find(x=>x.id===msgId);
  useEffect(() => {
    if (m && !m.read) db.collection('messages').doc(m.id).update({read:true});
  }, [msgId]);

  async function del() {
    if (!m||!confirm('Delete message from '+m.name+'?')) return;
    await db.collection('messages').doc(m.id).delete();
    nav.pop(); toast('Message deleted','success');
  }

  if (!m) return null;
  return (
    <div className="screen slide-right" style={{zIndex:20}}>
      <div className="topbar">
        <div className="ibtn" onClick={() => nav.pop()}><Icon name="arrow-left" size={20}/></div>

        <div className="ibtn" style={{color:'var(--red)'}} onClick={del}><Icon name="trash-2" size={18}/></div>
      </div>
      <div className="sbody pad">
        <div className="card" style={{display:'flex',gap:14,alignItems:'center',marginBottom:12}}>
          <div className="avatar" style={{width:48,height:48,fontSize:18}}>{(m.name||'U')[0].toUpperCase()}</div>
          <div>
            <div style={{fontSize:16,fontWeight:700,color:'var(--text)'}}>{m.name}</div>
            <div style={{fontSize:13,color:'var(--text2)'}}>{m.email}</div>
          </div>
          <div style={{marginLeft:'auto',fontSize:12,color:'var(--text3)'}}>{fmtTime(m.createdAt)}</div>
        </div>
        {m.subject && <div style={{fontSize:11,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.5px',marginBottom:6}}>Subject</div>}
        {m.subject && <div style={{fontSize:15,fontWeight:600,color:'var(--text)',marginBottom:16}}>{m.subject}</div>}
        <div className="card" style={{fontSize:14,color:'var(--text)',lineHeight:1.8,marginBottom:12}}>{m.message}</div>
        <div style={{display:'flex',gap:10}}>
          {m.email && <button style={{flex:1,padding:13,borderRadius:12,border:'none',background:'var(--accent)',color:'#fff',fontFamily:'Inter',fontSize:14,fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:8}} onClick={()=>window.location.href=`mailto:${m.email}?subject=Re: ${encodeURIComponent(m.subject||'Your message')}`}>
            <Icon name="mail" size={16} color="#fff"/> Reply
          </button>}
          {m.phone && <button style={{flex:1,padding:13,borderRadius:12,border:'none',background:'#25D366',color:'#fff',fontFamily:'Inter',fontSize:14,fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:8}} onClick={()=>window.open(`https://wa.me/${m.phone.replace(/\D/g,'')}`)}>
            <Icon name="message-circle" size={16} color="#fff"/> WhatsApp
          </button>}
        </div>
      </div>
    </div>
  );
}

// έΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡ
// ANALYTICS
// έΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡ
function Analytics({ nav }) {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    async function load() {
      try {
        const snap = await db.collection('analytics').get();
        const visits = snap.docs.map(d => d.data());
        // Aggregate
        const total    = visits.length;
        const pages    = {};
        const countries= {};
        visits.forEach(v => {
          const p = v.page||'/'; pages[p] = (pages[p]||0)+1;
          const c = v.country||'Unknown'; countries[c] = (countries[c]||0)+1;
        });
        const pageList = Object.entries(pages).sort((a,b)=>b[1]-a[1]).slice(0,6);
        const countryList = Object.entries(countries).sort((a,b)=>b[1]-a[1]).slice(0,6);
        setData({ total, pageList, countryList });
      } catch(e) { console.error(e); setData({ total:0, pageList:[], countryList:[] }); }
      finally { setLoading(false); }
    }
    load();
  }, []);

  const maxPage    = data?.pageList[0]?.[1]||1;
  const maxCountry = data?.countryList[0]?.[1]||1;

  const flagMap = { 'Zimbabwe':'ΏθΘ┐ΏθΘ╝','United States':'ΏθΘ║ΏθΘ╕','United Kingdom':'ΏθΘυΏθΘπ','South Africa':'ΏθΘ┐ΏθΘο','Nigeria':'ΏθΘ│ΏθΘυ','Kenya':'ΏθΘ░ΏθΘς','Canada':'ΏθΘρΏθΘο','Australia':'ΏθΘοΏθΘ║','Germany':'ΏθΘσΏθΘς','India':'ΏθΘχΏθΘ│','Unknown':'ΏθΝΞ' };

  return (
    <div className="screen slide-center" style={{zIndex:5}}>
      <div className="topbar">
        <div><div className="topbar-title">Analytics</div><div className="topbar-sub">Portfolio site traffic</div></div>
      </div>
      <div className="sbody pad">
        {loading
          ? <div className="spin-center"><div className="spin"/></div>
          : <>
            <div className="analytics-hero">
              <div className="a-big">{data.total.toLocaleString()}</div>
              <div className="a-sub">Total page visits tracked</div>
            </div>

            {data.total === 0 && (
              <div className="hint" style={{marginBottom:16}}>
                ΏθΥΛ No visits tracked yet. Add the tracking snippet to your portfolio site to start seeing data here.
                <br/><br/>
                <strong style={{color:'var(--text)'}}>Add this to every page of your portfolio:</strong>
              </div>
            )}

            {data.total === 0 && (
              <div className="card" style={{marginBottom:16}}>
                <div style={{fontSize:11,fontWeight:600,color:'var(--text3)',letterSpacing:'0.5px',marginBottom:8,textTransform:'uppercase'}}>Tracking Snippet</div>
                <pre style={{fontSize:11,color:'var(--accentL)',overflowX:'auto',lineHeight:1.6,background:'var(--bg)',padding:12,borderRadius:8,border:'1px solid var(--border)'}}>{`<script>
(async()=>{
  const r=await fetch('https://ipapi.co/json/');
  const d=await r.json();
  const {initializeApp}=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js');
  const {getFirestore,addDoc,collection,serverTimestamp}=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
  const app=initializeApp({projectId:"roychid-terminal",apiKey:"AIzaSyBRsenqkz6y8X9qv1kkp2lm9Ud3UzdOQ5A",authDomain:"roychid-terminal.firebaseapp.com"});
  const db=getFirestore(app);
  await addDoc(collection(db,'analytics'),{
    page:location.pathname,
    country:d.country_name||'Unknown',
    city:d.city||'',
    device:/Mobi|Android/i.test(navigator.userAgent)?'mobile':'desktop',
    ref:document.referrer||'direct',
    ts:serverTimestamp()
  });
})();
<\/script>`}</pre>
              </div>
            )}

            {data.pageList.length > 0 && (
              <>
                <div className="slabel">Top Pages</div>
                <div className="card">
                  {data.pageList.map(([page, count]) => (
                    <div key={page} className="bar-row">
                      <div className="bar-label" style={{fontSize:12,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{page==='/'?'Home':page}</div>
                      <div className="bar-track"><div className="bar-fill" style={{width:`${(count/maxPage)*100}%`}}/></div>
                      <div className="bar-count">{count}</div>
                    </div>
                  ))}
                </div>

                <div className="slabel">Visitors by Country</div>
                <div className="card">
                  {data.countryList.map(([country, count]) => (
                    <div key={country} className="bar-row">
                      <div className="bar-label" style={{display:'flex',alignItems:'center',gap:6,fontSize:12}}>
                        <span>{flagMap[country]||'ΏθΝΞ'}</span>
                        <span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{country}</span>
                      </div>
                      <div className="bar-track"><div className="bar-fill" style={{width:`${(count/maxCountry)*100}%`,background:'var(--green)'}}/></div>
                      <div className="bar-count">{count}</div>
                    </div>
                  ))}
                </div>
              </>
            )}
          </>
        }
      </div>
    </div>
  );
}

            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// έΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡ
// TAB BAR
// έΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡ
function TabBar({ active, onSwitch, unread }) {
  const tabs = [
    { id:'dash',      icon:'layout-dashboard', label:'Home'     },
    { id:'projects',  icon:'folder',           label:'Projects' },
    { id:'sections',  icon:'pencil',           label:'Site'     },
    { id:'analytics', icon:'bar-chart-2',      label:'Stats'    },
    { id:'messages',  icon:'message-square',   label:'Inbox'    },
  ];
  return (
    <div className="tabbar">
      {tabs.map(t => (
        <div key={t.id} className={`tabitem ${active===t.id?'active':''}`} onClick={() => onSwitch(t.id)}>
          <Icon name={t.icon} size={22}/>
          <div className="tabitem-label">{t.label}</div>
          {t.id==='messages' && unread>0 && <div className="tab-pip">{unread}</div>}
        </div>
      ))}
    </div>
  );
}

// έΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡ
// ROOT APP
// έΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡέΧΡ
function App() {
  const [locked,   setLocked]   = useState(true);
  const [projects, setProjects] = useState([]);
  const [sections, setSections] = useState({});
  const [messages, setMessages] = useState([]);
  const [stats,    setStats]    = useState({ projects:0, messages:0, visits:0 });
  const nav = useNav('dash');

  // Load data
  useEffect(() => {
    if (locked) return;
    // Projects
    db.collection('projects').orderBy('order','asc').get()
      .then(s => setProjects(s.docs.map(d=>({id:d.id,...d.data()})).filter(p=>!p.placeholder)))
      .catch(console.error);
    // Sections
    db.collection('sections').get()
      .then(s => { const o={}; s.docs.forEach(d=>{o[d.id]=d.data();}); setSections(o); })
      .catch(console.error);
    // Analytics count
    db.collection('analytics').get()
      .then(s => setStats(prev => ({...prev, visits:s.size})))
      .catch(()=>{});
  }, [locked]);

  // Real-time messages
  useEffect(() => {
    if (locked) return;
    const unsub = db.collection('messages').orderBy('createdAt','desc')
      .onSnapshot(snap => {
        const msgs = snap.docs.map(d=>({id:d.id,...d.data()})).filter(m=>!m.placeholder);
        setMessages(msgs);
        setStats(prev => ({...prev, messages:msgs.length, projects:prev.projects}));
      });
    return unsub;
  }, [locked]);

  // Update project count in stats
  useEffect(() => {
    setStats(prev => ({...prev, projects:projects.length}));
  }, [projects]);

  function reloadProjects() {
    return db.collection('projects').orderBy('order','asc').get()
      .then(s => setProjects(s.docs.map(d=>({id:d.id,...d.data()})).filter(p=>!p.placeholder)));
  }

  function unlock() { setLocked(false); }
  function lock()   { setLocked(true); nav.switchTab('dash'); }
  function resetPin() {
    localStorage.removeItem('rpin');
    lock();
  }

  const unread = messages.filter(m=>!m.read).length;

  // Parse pushed screen name + optional id
  const [screenName, screenId] = (nav.stack[nav.stack.length-1]||'').split(':');

  // Determine which root screen is visible
  function renderRootScreen() {
    switch(nav.tab) {
      case 'dash':      return <Dashboard nav={nav} stats={stats} messages={messages}/>;
      case 'projects':  return <Projects  nav={nav} projects={projects} reload={reloadProjects}/>;
      case 'sections':  return <Sections  nav={nav} sections={sections}/>;
      case 'analytics': return <Analytics nav={nav}/>;
      case 'messages':  return <Messages  nav={nav} messages={messages}/>;
      case 'settings':  return <Settings  nav={nav} onLock={lock} onResetPin={resetPin}/>;
      default:          return <Dashboard nav={nav} stats={stats} messages={messages}/>;
    }
  }

  // Render pushed screen on top
  function renderPushedScreen() {
    if (!screenName) return null;
    if (screenName === 'project-form')   return <ProjectForm   nav={nav} projects={projects} reload={reloadProjects} editId={screenId||null}/>;
    if (screenName === 'section-editor') return <SectionEditor nav={nav} sections={sections} setSections={setSections} sectionKey={screenId}/>;
    if (screenName === 'msg-detail')     return <MsgDetail     nav={nav} messages={messages} msgId={screenId}/>;
    return null;
  }

  if (locked) return <PinScreen onUnlock={unlock}/>;

  return (
    <div className="app">
      <div className="screens">
        {renderRootScreen()}
        {renderPushedScreen()}
      </div>
      <TabBar active={nav.tab} onSwitch={nav.switchTab} unread={unread}/>
      <Toast/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

<script>
if ('serviceWorker' in navigator)
  navigator.serviceWorker.register('service-worker.js').catch(()=>{});
</script>
</body>
</html>
