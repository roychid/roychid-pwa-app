<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Roy CMS">
  <meta name="theme-color" content="#09090b">
  <title>Roy CMS</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Firebase compat (v10) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>

  <!-- React 18 + Babel -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

  <!-- Lucide icons UMD -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.1/umd/lucide.min.js"></script>

  <style>
    :root {
      --bg:#09090b; --bg1:#111113; --bg2:#18181b; --bg3:#27272a;
      --border:#3f3f46; --border2:#52525b;
      --text:#fafafa; --text2:#a1a1aa; --text3:#71717a;
      --accent:#7c3aed; --accentL:#8b5cf6; --accentS:rgba(124,58,237,0.15);
      --green:#10b981; --greenS:rgba(16,185,129,0.12);
      --amber:#f59e0b; --red:#ef4444;
      --safe:env(safe-area-inset-bottom,0px);
      --top:env(safe-area-inset-top,0px);
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body,#root{height:100%;width:100%;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:15px;line-height:1.5;overflow:hidden;-webkit-font-smoothing:antialiased}

    .app{position:relative;width:100%;height:100%;display:flex;flex-direction:column;overflow:hidden}

    /* LOCK */
    .lock{position:fixed;inset:0;z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 0%,rgba(124,58,237,.15) 0%,var(--bg) 70%)}
    .lock-logo{width:76px;height:76px;border-radius:22px;background:var(--accentS);border:1px solid rgba(124,58,237,.35);display:flex;align-items:center;justify-content:center;margin-bottom:28px;box-shadow:0 0 40px rgba(124,58,237,.2)}
    .lock-title{font-size:24px;font-weight:800;color:var(--text);margin-bottom:6px;letter-spacing:-.5px}
    .lock-sub{font-size:13px;color:var(--text2);margin-bottom:44px}
    .pdots{display:flex;gap:14px;margin-bottom:12px}
    .pdot{width:13px;height:13px;border-radius:50%;border:2px solid var(--border);background:transparent;transition:all .15s}
    .pdot.on{background:var(--accent);border-color:var(--accent);transform:scale(1.1)}
    .perr{font-size:12px;color:var(--red);height:18px;margin-bottom:20px}
    .kpad{display:grid;grid-template-columns:repeat(3,70px);gap:10px}
    .kkey{width:70px;height:70px;border-radius:50%;background:var(--bg2);border:1px solid var(--border);color:var(--text);font-family:'Inter',sans-serif;font-size:22px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;user-select:none}
    .kkey:active{background:var(--bg3);transform:scale(.92)}
    .kkey.ghost{background:transparent;border-color:transparent;pointer-events:none}
    @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}
    .shaking{animation:shake .35s ease}

    /* SCREEN STACK */
    .screens{flex:1;position:relative;overflow:hidden}
    .screen{position:absolute;inset:0;display:flex;flex-direction:column;background:var(--bg);will-change:transform;transition:transform .32s cubic-bezier(.32,.72,0,1),opacity .32s}
    .screen.behind{transform:translateX(-6%);opacity:.7;pointer-events:none}
    .screen.front{transform:translateX(0);opacity:1}
    .screen.offright{transform:translateX(100%)}

    /* TAB BAR */
    .tabbar{display:flex;background:rgba(17,17,19,.95);border-top:1px solid var(--border);padding-bottom:var(--safe);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);flex-shrink:0}
    .tabitem{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:10px 0;cursor:pointer;position:relative;transition:opacity .15s}
    .tabitem-label{font-size:10px;font-weight:500;color:var(--text3);letter-spacing:.2px;transition:color .15s}
    .tabitem.active .tabitem-label{color:var(--accentL)}
    .tabitem svg{color:var(--text3);transition:color .15s}
    .tabitem.active svg{color:var(--accentL)}
    .tab-pip{position:absolute;top:8px;right:calc(50% - 14px);min-width:16px;height:16px;border-radius:8px;background:var(--red);font-size:10px;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center;padding:0 4px}

    /* TOPBAR */
    .topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;padding-top:calc(12px + var(--top));background:rgba(17,17,19,.95);border-bottom:1px solid var(--border);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);flex-shrink:0;min-height:56px}
    .topbar-title{font-size:18px;font-weight:700;color:var(--text);letter-spacing:-.3px}
    .topbar-sub{font-size:11px;color:var(--text3);margin-top:1px}
    .ibtn{width:36px;height:36px;border-radius:10px;background:var(--bg2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s;flex-shrink:0;color:var(--text2)}
    .ibtn:active{background:var(--bg3)}
    .ibtn.accent{background:var(--accent);border-color:var(--accent);color:#fff}

    /* SCROLL BODY */
    .sbody{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scroll-behavior:smooth}
    .pad{padding:16px} .pad2{padding:20px}

    /* CARDS */
    .card{background:var(--bg1);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px}
    .card2{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}

    /* LABELS */
    .slabel{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.8px;text-transform:uppercase;margin-bottom:10px;margin-top:4px}

    /* DASHBOARD */
    .greeting{font-size:24px;font-weight:800;color:var(--text);letter-spacing:-.5px;line-height:1.2}
    .greeting-sub{font-size:13px;color:var(--text3);margin-top:4px;margin-bottom:24px}
    .stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:24px}
    .stat-box{background:var(--bg1);border:1px solid var(--border);border-radius:14px;padding:14px 10px;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;transition:border-color .15s,transform .15s}
    .stat-box:active{transform:scale(.96);border-color:var(--accent)}
    .stat-ico{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center}
    .stat-n{font-size:22px;font-weight:800;color:var(--text);letter-spacing:-.5px}
    .stat-l{font-size:10px;color:var(--text3);text-align:center;font-weight:500}
    .quick-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px}
    .qbtn{background:var(--bg1);border:1px solid var(--border);border-radius:14px;padding:16px 14px;display:flex;flex-direction:column;gap:10px;cursor:pointer;transition:border-color .15s,transform .15s}
    .qbtn:active{transform:scale(.97);border-color:var(--accent)}
    .qbtn-ico{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center}
    .qbtn-label{font-size:13px;font-weight:600;color:var(--text)}
    .rrow{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--border);cursor:pointer}
    .rrow:last-child{border-bottom:none;padding-bottom:0}
    .rrow-title{font-size:14px;font-weight:500;color:var(--text);flex:1}
    .rrow-sub{font-size:12px;color:var(--text3);margin-top:1px}
    .avatar{width:36px;height:36px;border-radius:50%;background:var(--accentS);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--accentL);flex-shrink:0}

    /* BADGE */
    .badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px}

    /* PROJECTS */
    .pcard{background:var(--bg1);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:14px}
    .pcover{width:100%;height:160px;background:var(--bg2);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
    .pcover img{width:100%;height:100%;object-fit:cover}
    .pcover-ph{display:flex;flex-direction:column;align-items:center;gap:6px;color:var(--text3)}
    .pbody{padding:14px}
    .ptop{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
    .pname{font-size:16px;font-weight:700;color:var(--text);letter-spacing:-.2px;flex:1;margin-right:8px}
    .pdesc{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:10px}
    .tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
    .tag{font-size:11px;font-weight:500;color:var(--accentL);background:var(--accentS);padding:3px 9px;border-radius:20px}
    .pacts{display:flex;gap:8px;border-top:1px solid var(--border);padding-top:12px}
    .pabtn{flex:1;padding:9px;border-radius:9px;border:1px solid var(--border);background:var(--bg2);font-size:12px;font-weight:600;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;font-family:'Inter',sans-serif;transition:all .15s}
    .pabtn:active{background:var(--bg3)}
    .pabtn.p{background:var(--accent);border-color:var(--accent);color:#fff}
    .pabtn.d{color:var(--red);border-color:rgba(239,68,68,.3)}

    /* FORM */
    .field{margin-bottom:18px}
    .field-label{display:block;font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px}
    .finput,.ftarea{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;font-family:'Inter',sans-serif;font-size:14px;color:var(--text);outline:none;-webkit-appearance:none;transition:border-color .2s}
    .finput:focus,.ftarea:focus{border-color:var(--accent)}
    .ftarea{resize:none}
    .finput::placeholder,.ftarea::placeholder{color:var(--text3)}
    .spills{display:flex;gap:8px}
    .spill{flex:1;padding:10px;border-radius:9px;border:1px solid var(--border);background:var(--bg2);font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;text-align:center;font-family:'Inter',sans-serif;transition:all .15s}
    .spill.on{border-color:var(--accent);background:var(--accentS);color:var(--accentL)}
    .imgpick{width:100%;height:160px;border-radius:12px;border:2px dashed var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;cursor:pointer;overflow:hidden;position:relative;background:var(--bg2);transition:border-color .2s}
    .imgpick:active{border-color:var(--accent)}
    .imgpick img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
    .imgpick-ov{position:absolute;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:2}
    .btn-a{width:100%;padding:14px;border-radius:12px;background:var(--accent);border:none;color:#fff;font-family:'Inter',sans-serif;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;letter-spacing:-.2px;transition:opacity .2s}
    .btn-a:active{opacity:.82}
    .btn-a:disabled{opacity:.4;cursor:not-allowed}
    .btn-g{width:100%;padding:13px;border-radius:12px;background:transparent;border:1px solid var(--border);color:var(--text2);font-family:'Inter',sans-serif;font-size:14px;font-weight:500;cursor:pointer;margin-top:10px;transition:background .15s}
    .btn-g:active{background:var(--bg2)}

    /* MESSAGES */
    .mcard{background:var(--bg1);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px;cursor:pointer;display:flex;gap:12px;align-items:flex-start;transition:border-color .15s}
    .mcard.unread{border-color:rgba(124,58,237,.5);background:rgba(124,58,237,.04)}
    .mcard:active{border-color:var(--border2)}
    .minfo{flex:1;min-width:0}
    .mtop{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
    .mname{font-size:14px;font-weight:600;color:var(--text)}
    .mtime{font-size:11px;color:var(--text3)}
    .msubj{font-size:13px;font-weight:500;color:var(--text);margin-bottom:2px}
    .mprev{font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .udot{width:8px;height:8px;border-radius:50%;background:var(--accentL);flex-shrink:0;margin-top:4px}

    /* SECTIONS */
    .secitem{background:var(--bg1);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:10px;display:flex;gap:14px;align-items:center;cursor:pointer;transition:border-color .15s}
    .secitem:active{border-color:var(--accent)}
    .secico{width:44px;height:44px;border-radius:11px;background:var(--accentS);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--accentL)}

    /* ANALYTICS */
    .analytics-hero{background:linear-gradient(135deg,var(--accentS),rgba(124,58,237,.05));border:1px solid rgba(124,58,237,.2);border-radius:16px;padding:20px;margin-bottom:16px}
    .a-big{font-size:48px;font-weight:800;color:var(--text);letter-spacing:-2px;line-height:1}
    .a-sub{font-size:13px;color:var(--text2);margin-top:4px}
    .a-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
    .a-box{background:var(--bg1);border:1px solid var(--border);border-radius:14px;padding:16px}
    .a-box-n{font-size:24px;font-weight:800;color:var(--text);letter-spacing:-.5px}
    .a-box-l{font-size:11px;color:var(--text3);margin-top:2px;font-weight:500}
    .bar-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
    .bar-row:last-child{border-bottom:none}
    .bar-label{font-size:13px;color:var(--text2);width:80px;flex-shrink:0}
    .bar-track{flex:1;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden}
    .bar-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .8s cubic-bezier(.16,1,.3,1)}
    .bar-count{font-size:12px;color:var(--text3);width:28px;text-align:right;flex-shrink:0}

    /* SETTINGS */
    .sgroup{margin-bottom:24px}
    .srows{background:var(--bg1);border:1px solid var(--border);border-radius:14px;overflow:hidden}
    .srow{display:flex;align-items:center;gap:14px;padding:14px 16px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .15s}
    .srow:last-child{border-bottom:none}
    .srow:active{background:var(--bg2)}
    .srow-ico{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .srow-label{font-size:14px;font-weight:500;color:var(--text);flex:1}
    .srow-sub{font-size:12px;color:var(--text3);margin-top:1px}

    /* EMPTY */
    .empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:12px}
    .empty-ico{color:var(--text3);margin-bottom:4px}
    .empty-title{font-size:16px;font-weight:600;color:var(--text2)}
    .empty-sub{font-size:13px;color:var(--text3);text-align:center;line-height:1.6}

    /* TOAST */
    .toast-wrap{position:fixed;bottom:calc(72px + var(--safe));left:50%;transform:translateX(-50%) translateY(16px);z-index:999;pointer-events:none;width:calc(100% - 32px);max-width:360px;transition:all .3s cubic-bezier(.32,.72,0,1);opacity:0}
    .toast-wrap.visible{transform:translateX(-50%) translateY(0);opacity:1}
    .toast-inner{background:var(--bg3);border:1px solid var(--border2);border-radius:12px;padding:13px 16px;font-size:13px;font-weight:500;text-align:center}
    .toast-inner.s{border-color:var(--green);color:var(--green)}
    .toast-inner.e{border-color:var(--red);color:var(--red)}

    /* SPINNER */
    .spin{width:22px;height:22px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spinning .6s linear infinite}
    @keyframes spinning{to{transform:rotate(360deg)}}
    .spin-center{display:flex;align-items:center;justify-content:center;padding:60px}

    /* HINT */
    .hint{background:var(--accentS);border:1px solid rgba(124,58,237,.2);border-radius:10px;padding:12px;margin-bottom:20px;font-size:13px;color:var(--text2);line-height:1.6}

    ::-webkit-scrollbar{width:0}

    @media(min-width:480px){
      .app{max-width:480px;margin:0 auto;box-shadow:0 0 0 1px var(--border)}
      body{background:#000}
    }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ── Firebase ──────────────────────────────────────────────
firebase.initializeApp({
  apiKey:            "AIzaSyBRsenqkz6y8X9qv1kkp2lm9Ud3UzdOQ5A",
  authDomain:        "roychid-terminal.firebaseapp.com",
  projectId:         "roychid-terminal",
  storageBucket:     "roychid-terminal.firebasestorage.app",
  messagingSenderId: "315928325816",
  appId:             "1:315928325816:web:51874a4df9128de9b8ce4d"
});
const db      = firebase.firestore();
const storage = firebase.storage();
const ts      = () => firebase.firestore.FieldValue.serverTimestamp();

// ── Icon component — renders after mount using Lucide UMD ─
function Icon({ name, size = 20, color, style }) {
  const ref = useRef(null);
  useEffect(() => {
    if (!ref.current || !window.lucide) return;
    const key = name.replace(/-([a-z])/g, (_, c) => c.toUpperCase());
    const iconFn = window.lucide[key.charAt(0).toUpperCase() + key.slice(1)];
    if (!iconFn) return;
    ref.current.innerHTML = '';
    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.setAttribute('width', size);
    svg.setAttribute('height', size);
    svg.setAttribute('viewBox', '0 0 24 24');
    svg.setAttribute('fill', 'none');
    svg.setAttribute('stroke', color || 'currentColor');
    svg.setAttribute('stroke-width', '1.8');
    svg.setAttribute('stroke-linecap', 'round');
    svg.setAttribute('stroke-linejoin', 'round');
    // Use lucide's toSvg approach
    const tmp = document.createElement('div');
    tmp.innerHTML = iconFn.toSvg({ width: size, height: size, color: color || 'currentColor', 'stroke-width': 1.8 });
    if (tmp.firstChild) ref.current.appendChild(tmp.firstChild);
  }, [name, size, color]);
  return (
    <span ref={ref} style={{ display:'inline-flex', alignItems:'center', justifyContent:'center', flexShrink:0, ...style }} />
  );
}

// ── Toast ─────────────────────────────────────────────────
let _toast = null;
function Toast() {
  const [s, setS] = useState({ msg:'', type:'', v:false });
  const t = useRef(null);
  useEffect(() => {
    _toast = (msg, type='') => {
      clearTimeout(t.current);
      setS({ msg, type, v:true });
      t.current = setTimeout(() => setS(p => ({...p, v:false})), 3000);
    };
  }, []);
  return (
    <div className={`toast-wrap ${s.v ? 'visible' : ''}`}>
      <div className={`toast-inner ${s.type==='success'?'s':s.type==='error'?'e':''}`}>{s.msg}</div>
    </div>
  );
}
const toast = (msg, type) => _toast && _toast(msg, type);

// ── Helpers ───────────────────────────────────────────────
function fmtTime(ts) {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  const diff = Date.now() - d;
  if (diff < 60000) return 'Just now';
  if (diff < 3600000) return Math.floor(diff/60000)+'m ago';
  if (diff < 86400000) return Math.floor(diff/3600000)+'h ago';
  return d.toLocaleDateString();
}

// ── Navigation hook ───────────────────────────────────────
function useNav(initial = 'dash') {
  const [tab,   setTab]   = useState(initial);
  const [stack, setStack] = useState([]);

  const switchTab = useCallback(name => { setTab(name); setStack([]); }, []);
  const push      = useCallback(name => setStack(s => [...s, name]), []);
  const pop       = useCallback(() => setStack(s => s.slice(0,-1)), []);

  const current = stack.length ? stack[stack.length-1] : tab;
  return { tab, stack, current, switchTab, push, pop };
}

// ── PIN screen ────────────────────────────────────────────
function PinScreen({ onUnlock }) {
  const [buf,  setBuf]  = useState('');
  const [mode, setMode] = useState(() => localStorage.getItem('rpin') ? 'enter' : 'set');
  const [conf, setConf] = useState('');
  const [err,  setErr]  = useState('');
  const [shk,  setShk]  = useState(false);

  function shake() { setShk(true); setTimeout(()=>setShk(false),400); }

  function press(k) {
    if (k==='del') { setBuf(b=>b.slice(0,-1)); return; }
    if (buf.length>=4) return;
    const next = buf+k;
    setBuf(next);
    if (next.length===4) setTimeout(()=>handle(next),120);
  }

  function handle(pin) {
    if (mode==='set') {
      setConf(pin); setBuf(''); setMode('confirm'); setErr('');
    } else if (mode==='confirm') {
      if (pin===conf) { localStorage.setItem('rpin',pin); onUnlock(); }
      else { setBuf(''); setConf(''); setMode('set'); setErr("PINs didn't match"); shake(); }
    } else {
      if (pin===localStorage.getItem('rpin')) { onUnlock(); }
      else { setBuf(''); setErr('Incorrect PIN'); shake(); }
    }
  }

  const titles = { set:'Create a PIN', confirm:'Confirm PIN', enter:'Welcome back, Roy' };
  const subs   = { set:'Set a 4-digit PIN to protect your CMS', confirm:'Enter your PIN again', enter:'Enter your PIN to continue' };

  return (
    <div className="lock">
      <div className="lock-logo"><Icon name="layout-dashboard" size={32} color="#8b5cf6"/></div>
      <div className="lock-title">{titles[mode]}</div>
      <div className="lock-sub">{subs[mode]}</div>
      <div className={`pdots ${shk?'shaking':''}`}>
        {[0,1,2,3].map(i=><div key={i} className={`pdot ${i<buf.length?'on':''}`}/>)}
      </div>
      <div className="perr">{err}</div>
      <div className="kpad">
        {['1','2','3','4','5','6','7','8','9','','0','del'].map((k,i)=>(
          <div key={i} className={`kkey ${k===''?'ghost':''}`} onClick={()=>k&&press(k)}>
            {k==='del' ? <Icon name="delete" size={20}/> : k}
          </div>
        ))}
      </div>
    </div>
  );
}

function ProjectForm({ nav, projects, reload, editId }) {
  const editing = editId ? projects.find(p=>p.id===editId) : null;
  const [title,   setTitle]   = useState(editing?.title||'');
  const [desc,    setDesc]    = useState(editing?.description||'');
  const [live,    setLive]    = useState(editing?.liveUrl||'');
  const [github,  setGithub]  = useState(editing?.githubUrl||'');
  const [tags,    setTags]    = useState((editing?.tags||[]).join(', '));
  const [status,  setStatus]  = useState(editing?.status||'Live');
  const [imgFile, setImgFile] = useState(null);
  const [imgPrev, setImgPrev] = useState(editing?.imageUrl||null);
  const [saving,  setSaving]  = useState(false);

  async function save() {
    if (!title.trim()) { toast('Title is required','error'); return; }
    setSaving(true);
    let imageUrl  = editing?.imageUrl||null;
    let imagePath = editing?.imagePath||null;
    try {
      if (imgFile) {
        const path = `projects/${Date.now()}_${imgFile.name}`;
        const ref  = storage.ref(path);
        await ref.put(imgFile);
        imageUrl  = await ref.getDownloadURL();
        imagePath = path;
      }
      const data = {
        title:title.trim(), description:desc.trim(),
        liveUrl:live.trim(), githubUrl:github.trim(),
        tags:tags.split(',').map(t=>t.trim()).filter(Boolean),
        status, imageUrl, imagePath
      };
      if (editing) {
        await db.collection('projects').doc(editing.id).update({...data, updatedAt:ts()});
      } else {
        await db.collection('projects').add({...data, order:Date.now(), createdAt:ts()});
      }
      await reload();
      toast(editing?'Project updated ✓':'Project added ✓','success');
      nav.pop();
    } catch(e) { toast('Save failed: '+e.message,'error'); console.error(e); }
    finally { setSaving(false); }
  }

  return (
    <div className="screen offright" style={{zIndex:20}}>
      <div className="topbar">
        <div className="ibtn" onClick={()=>nav.pop()}><Icon name="arrow-left" size={20}/></div>
        <div className="topbar-title">{editing?'Edit Project':'New Project'}</div>
        <div style={{width:36}}/>
      </div>
      <div className="sbody pad2">
        <div className="field">
          <label className="field-label">Cover Image</label>
          <div className="imgpick" onClick={()=>document.getElementById('imgInput').click()}>
            {imgPrev && <img src={imgPrev} alt="preview"/>}
            {imgPrev
              ? <div className="imgpick-ov"><span style={{color:'#fff',fontSize:13,fontWeight:600}}>Change Image</span></div>
              : <><Icon name="image" size={28} color="var(--text3)"/><span style={{fontSize:13,color:'var(--text2)'}}>Tap to add cover image</span></>
            }
          </div>
          <input type="file" id="imgInput" accept="image/*" style={{display:'none'}} onChange={e=>{
            const f=e.target.files[0]; if(!f) return;
            setImgFile(f); setImgPrev(URL.createObjectURL(f));
          }}/>
        </div>
        <div className="field"><label className="field-label">Project Title *</label><input className="finput" value={title} onChange={e=>setTitle(e.target.value)} placeholder="e.g. Euro Live"/></div>
        <div className="field"><label className="field-label">Description</label><textarea className="ftarea" rows={4} value={desc} onChange={e=>setDesc(e.target.value)} placeholder="What does this project do?"/></div>
        <div className="field"><label className="field-label">Live URL</label><input className="finput" value={live} onChange={e=>setLive(e.target.value)} placeholder="https://myproject.com"/></div>
        <div className="field"><label className="field-label">GitHub URL</label><input className="finput" value={github} onChange={e=>setGithub(e.target.value)} placeholder="https://github.com/..."/></div>
        <div className="field"><label className="field-label">Tags (comma separated)</label><input className="finput" value={tags} onChange={e=>setTags(e.target.value)} placeholder="React, Firebase, CSS"/></div>
        <div className="field">
          <label className="field-label">Status</label>
          <div className="spills">
            {['Live','Draft','Archived'].map(s=><div key={s} className={`spill ${status===s?'on':''}`} onClick={()=>setStatus(s)}>{s}</div>)}
          </div>
        </div>

  );
}

              <div className="a-sub">Total page visits tracked</div>
            </div>

            {data.total>0 && (
              <div className="a-grid">
                <div className="a-box">
                  <div className="a-box-n">{data.mobile}</div>
                  <div className="a-box-l">📱 Mobile</div>
                </div>
                <div className="a-box">
                  <div className="a-box-n">{data.desktop}</div>
                  <div className="a-box-l">🖥️ Desktop</div>
                </div>
              </div>
            )}

            {data.total===0 && (
              <div className="hint">
                📊 No visits yet. The analytics snippet is already embedded in your portfolio site files. Once your site is deployed and visited, data will appear here.
              </div>
            )}

            {data.pageList.length>0 && <>
              <div className="slabel">Top Pages</div>
              <div className="card">
                {data.pageList.map(([page,count])=>(
                  <div key={page} className="bar-row">
                    <div className="bar-label" style={{fontSize:12,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{page==='/'?'Home':page}</div>
                    <div className="bar-track"><div className="bar-fill" style={{width:`${(count/maxP)*100}%`}}/></div>
                    <div className="bar-count">{count}</div>
                  </div>
                ))}
              </div>
              <div className="slabel">Visitors by Country</div>
              <div className="card">
                {data.countryList.map(([country,count])=>(
                  <div key={country} className="bar-row">
                    <div className="bar-label" style={{display:'flex',alignItems:'center',gap:6,fontSize:12}}>
                      <span>{flags[country]||'🌍'}</span>
                      <span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{country}</span>
                    </div>
                    <div className="bar-track"><div className="bar-fill" style={{width:`${(count/maxC)*100}%`,background:'var(--green)'}}/></div>
                    <div className="bar-count">{count}</div>
                  </div>
                ))}
              </div>
            </>}

            <div className="slabel">Tracking Snippet</div>
            <div className="card">
              <div style={{fontSize:11,fontWeight:600,color:'var(--text3)',letterSpacing:'.5px',marginBottom:8,textTransform:'uppercase'}}>Already in your portfolio — reference copy</div>
              <pre style={{fontSize:10.5,color:'var(--accentL)',overflowX:'auto',lineHeight:1.6,background:'var(--bg)',padding:12,borderRadius:8,border:'1px solid var(--border)',whiteSpace:'pre-wrap',wordBreak:'break-all'}}>{snippet}</pre>
            </div>
          </>
        }
      </div>
    </div>
  );
}

// ── Settings ──────────────────────────────────────────────
function Settings({ nav, onLock, onResetPin }) {
  const [notif, setNotif] = useState(typeof Notification!=='undefined'?Notification.permission:'default');

  async function reqNotif() {
    if (!('Notification' in window)) { toast('Not supported','error'); return; }
    const p = await Notification.requestPermission();
    setNotif(p);
    toast(p==='granted'?'Notifications enabled ✓':'Notifications blocked', p==='granted'?'success':'error');
  }

  const rows = [
    { group:'Security', items:[
      { icon:'key',      label:'Change PIN',       sub:'Reset your 4-digit PIN', action:onResetPin, c:'rgba(245,158,11,.15)', ic:'var(--amber)' },
      { icon:'lock',     label:'Lock App',         sub:'Return to PIN screen',   action:onLock,     c:'var(--accentS)',       ic:'var(--accentL)' },
    ]},
    { group:'Notifications', items:[
      { icon:'bell',     label:'Push Notifications', sub:notif==='granted'?'Enabled ✓':notif==='denied'?'Blocked in browser':'Tap to enable', action:reqNotif, c:'rgba(16,185,129,.12)', ic:'var(--green)' },
    ]},
    { group:'Firebase', items:[
      { icon:'database', label:'Project ID', sub:'roychid-terminal', action:null, c:'rgba(249,115,22,.15)', ic:'#f97316' },
    ]},
    { group:'App', items:[
      { icon:'info', label:'Roy CMS', sub:'Version 4.0 · Personal use', action:null, c:'var(--accentS)', ic:'var(--accentL)' },
    ]},
  ];

  return (
    <div className="screen front" style={{zIndex:5}}>
      <div className="topbar">
        <div><div className="topbar-title">Settings</div><div className="topbar-sub">Roy CMS</div></div>
      </div>
      <div className="sbody pad">
        {rows.map(grp=>(
          <div key={grp.group} className="sgroup">
            <div className="slabel">{grp.group}</div>
            <div className="srows">
              {grp.items.map(row=>(
                <div key={row.label} className="srow" onClick={row.action||undefined}>
                  <div className="srow-ico" style={{background:row.c}}><Icon name={row.icon} size={16} color={row.ic}/></div>
                  <div style={{flex:1}}>
                    <div className="srow-label">{row.label}</div>
                    <div className="srow-sub">{row.sub}</div>
                  </div>
                  {row.action && <Icon name="chevron-right" size={16} color="var(--text3)"/>}
                </div>
              ))}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── Tab Bar ───────────────────────────────────────────────
function TabBar({ active, onSwitch, unread }) {
  const tabs = [
    { id:'dash',      icon:'layout-dashboard', label:'Home'     },
    { id:'projects',  icon:'folder',           label:'Projects' },
    { id:'sections',  icon:'pencil',           label:'Site'     },
    { id:'analytics', icon:'bar-chart-2',      label:'Stats'    },
    { id:'messages',  icon:'message-square',   label:'Inbox'    },
  ];
  return (
    <div className="tabbar">
      {tabs.map(t=>(
        <div key={t.id} className={`tabitem ${active===t.id?'active':''}`} onClick={()=>onSwitch(t.id)}>
          <Icon name={t.icon} size={22}/>
          <div className="tabitem-label">{t.label}</div>
          {t.id==='messages'&&unread>0&&<div className="tab-pip">{unread}</div>}
        </div>
      ))}
    </div>
  );
}

// ── Screen Wrapper — handles slide animation ──────────────
function ScreenLayer({ children, isTop, hasStack }) {
  // If there's a pushed screen on top, slide this one behind
  const cls = hasStack ? 'behind' : 'front';
  return React.cloneElement(children, {
    className: `screen ${children.props.className||''} ${cls}`.trim()
  });
}

// ── Root App ──────────────────────────────────────────────
function App() {
  const [locked,   setLocked]   = useState(true);
  const [projects, setProjects] = useState([]);
  const [sections, setSections] = useState({});
  const [messages, setMessages] = useState([]);
  const [stats,    setStats]    = useState({ projects:0, messages:0, visits:0 });
  const nav = useNav('dash');

  // Load all data once unlocked
  useEffect(()=>{
    if (locked) return;
    db.collection('projects').orderBy('order','asc').get()
      .then(s=>setProjects(s.docs.map(d=>({id:d.id,...d.data()})).filter(p=>!p.placeholder)))
      .catch(console.error);
    db.collection('sections').get()
      .then(s=>{ const o={}; s.docs.forEach(d=>{o[d.id]=d.data();}); setSections(o); })
      .catch(console.error);
    db.collection('analytics').get()
      .then(s=>setStats(p=>({...p,visits:s.size})))
      .catch(()=>{});
  },[locked]);

  // Real-time messages
  useEffect(()=>{
    if (locked) return;
    const unsub = db.collection('messages').orderBy('createdAt','desc')
      .onSnapshot(snap=>{
        const msgs = snap.docs.map(d=>({id:d.id,...d.data()})).filter(m=>!m.placeholder);
        setMessages(msgs);
        setStats(p=>({...p,messages:msgs.length}));
      });
    return unsub;
  },[locked]);

  useEffect(()=>{ setStats(p=>({...p,projects:projects.length})); },[projects]);

  function reloadProjects() {
    return db.collection('projects').orderBy('order','asc').get()
      .then(s=>setProjects(s.docs.map(d=>({id:d.id,...d.data()})).filter(p=>!p.placeholder)));
  }

  function unlock()   { setLocked(false); }
  function lock()     { setLocked(true); nav.switchTab('dash'); }
  function resetPin() { localStorage.removeItem('rpin'); lock(); }

  const unread = messages.filter(m=>!m.read).length;

  // Parse the top of the push stack
  const topFrame = nav.stack[nav.stack.length-1]||'';
  const [screenName, screenId] = topFrame.split(':');
  const hasStack = nav.stack.length > 0;

  // Root screen
  function rootScreen() {
    switch(nav.tab) {
      case 'dash':      return <Dashboard  nav={nav} stats={stats} messages={messages}/>;
      case 'projects':  return <Projects   nav={nav} projects={projects} reload={reloadProjects}/>;
      case 'sections':  return <Sections   nav={nav} sections={sections}/>;
      case 'analytics': return <Analytics  nav={nav}/>;
      case 'messages':  return <Messages   nav={nav} messages={messages}/>;
      case 'settings':  return <Settings   nav={nav} onLock={lock} onResetPin={resetPin}/>;
      default:          return <Dashboard  nav={nav} stats={stats} messages={messages}/>;
    }
  }

  // Pushed screen
  function pushedScreen() {
    if (!screenName) return null;
    if (screenName==='project-form')   return <ProjectForm   nav={nav} projects={projects} reload={reloadProjects} editId={screenId||null}/>;
    if (screenName==='section-editor') return <SectionEditor nav={nav} sections={sections} setSections={setSections} sectionKey={screenId}/>;
    if (screenName==='msg-detail')     return <MsgDetail     nav={nav} messages={messages} msgId={screenId}/>;
    return null;
  }

  // Modify root screen class based on stack depth
  const root = rootScreen();
  const rootWithClass = React.cloneElement(root, {
    className: `screen ${hasStack ? 'behind' : 'front'}`,
    style: { ...root.props.style, zIndex:5 }
  });

  const pushed = pushedScreen();
  const pushedWithClass = pushed ? React.cloneElement(pushed, {
    className: `screen front`,
    style: { ...pushed.props.style, zIndex:20 }
  }) : null;

  if (locked) return <PinScreen onUnlock={unlock}/>;

  return (
    <div className="app">
      <div className="screens">
        {rootWithClass}
        {pushedWithClass}
      </div>
      <TabBar active={nav.tab} onSwitch={nav.switchTab} unread={unread}/>
      <Toast/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

<script>
if ('serviceWorker' in navigator)
  navigator.serviceWorker.register('service-worker.js').catch(()=>{});
</script>
</body>
</html>
